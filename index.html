<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Life Music</title>
<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
header { background: black; color: white; padding: 20px; text-align: center; }
.container { padding: 20px; }
.producto { background: white; padding: 15px; margin: 10px; border-radius: 10px; }
button { background: green; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
button:hover { background: darkgreen; }
</style>
</head>

<body>

<header>
<h1>🎸 Life Music</h1>
<p>Instrumentos y accesorios musicales</p>
<p>📍 Goycoechea 486 esq. Sargento Cabral - Villa Allende, Córdoba</p>
<p>🕒 Lunes a Viernes 09:30 a 13:30 - 17:30 a 20:30</p>
</header>

<div class="container">

<h2>Productos</h2>

<div class="producto">
<h3>Guitarra Criolla</h3>
<p>$120.000</p>
<button onclick="consultar('Guitarra Criolla')">Consultar por WhatsApp</button>
</div>

<div class="producto">
<h3>Cuerdas para guitarra</h3>
<p>$8.500</p>
<button onclick="consultar('Cuerdas para guitarra')">Consultar por WhatsApp</button>
</div>

<div class="producto">
<h3>Afinador digital</h3>
<p>$15.000</p>
<button onclick="consultar('Afinador digital')">Consultar por WhatsApp</button>
</div>

</div>

<script>
function consultar(producto) {
const numero = "5493516570441";
const mensaje = "Hola! Me interesa: " + producto;
window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
}
</script>

</body>
</html>
